# Goldilocks backend — production stack.
#
# Runs the whole service on one box and exposes it to the internet through
# a Cloudflare tunnel (no static IP, no open inbound ports).
#
# All configuration comes from a local .env.prod file (chmod 600, never
# committed). The CLI sets it up — see docs/production-setup.md.
#
# Deploy with:  ./scripts/deploy.sh
# Or directly:  docker compose -f docker-compose.prod.yml up -d --build
#
# See docs/production-setup.md for the full runbook.

name: goldilocks-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  goldilocks-db:
    image: postgres:16
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goldilocks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-goldilocks}
    volumes:
      - goldilocks-pgdata:/var/lib/postgresql/data
      # F5 — TLS material from scripts/init-tls.sh. The bind-mounted
      # files are copied into a writable location with postgres
      # ownership by db-entrypoint.sh so the server can read its own
      # key (a bind mount alone preserves host-operator ownership,
      # which postgres rejects).
      - ./secrets/tls:/etc/postgresql-tls-src:ro
      - ./scripts/db-entrypoint.sh:/usr/local/bin/db-entrypoint.sh:ro
    entrypoint: /usr/local/bin/db-entrypoint.sh
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/etc/postgresql-tls/server.crt"
      - "-c"
      - "ssl_key_file=/etc/postgresql-tls/server.key"
      - "-c"
      - "ssl_ca_file=/etc/postgresql-tls/ca.crt"
      - "-c"
      - "ssl_min_protocol_version=TLSv1.3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goldilocks} -d ${POSTGRES_DB:-goldilocks}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Published on the loopback interface only (127.0.0.1) so the goldilocks
    # CLI on this box can connect for admin / client management. Not
    # reachable from the network or the internet.
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build: .
    image: goldilocks-backend:latest
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      goldilocks-db:
        condition: service_healthy
    # No `env_file:` — secrets enter compose's process env via
    # `sops exec-env secrets/prod.env.enc <command>` (see scripts/deploy.sh)
    # and are forwarded into the container by the list below. The bare
    # `KEY` form pulls KEY from compose's process env; `KEY=value` is a
    # literal. Plaintext `.env.prod` never touches disk.
    environment:
      # --- literals ---
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4000
      # F5 — mTLS to Postgres. sslmode=verify-full pins the server cert
      # against the CA AND verifies the hostname. sslcert+sslkey present
      # this container's CA-signed client leaf, which Postgres maps onto
      # the matching DB role via the `cert` auth method in
      # scripts/db-entrypoint.sh.
      - DATABASE_URL=postgres://${POSTGRES_USER:-goldilocks}:${POSTGRES_PASSWORD}@goldilocks-db:5432/${POSTGRES_DB:-goldilocks}?sslmode=verify-full&sslrootcert=/etc/goldilocks-tls/ca.crt&sslcert=/etc/goldilocks-tls/client.crt&sslkey=/etc/goldilocks-tls/client.key
      # Self-promote is a dev-only backdoor. Hard-off in production.
      - GOLDILOCKS_ALLOW_SELF_PROMOTE=false
      # Attachment bytes (STORAGE_PROVIDER=local) are written here.
      - LOCAL_STORAGE_DIR=/var/lib/goldilocks-attachments
      # --- forwarded from compose process env (populated by sops exec-env) ---
      # Add new vars here AND to secrets/prod.env.enc. Listed explicitly so
      # we can audit which variables reach the container.
      - JWT_SECRET
      - JWT_TTL_SECONDS
      - REFRESH_TTL_DAYS
      - APP_ENCRYPTION_KEY
      - ENCRYPT_AT_REST_V1
      - CORS_ORIGIN
      - LOG_LEVEL
      - PUBLIC_BASE_URL
      - SIWE_DOMAIN
      - SIWE_URI
      - STORAGE_PROVIDER
      - LIGHTHOUSE_API_KEY
      - LIGHTHOUSE_WALLET_PRIVATE_KEY
      - IPFS_GATEWAY
      - XMTP_GRPC_URL
      - XMTP_GRPC_SECURE
      - XMTP_NETWORK
      - XMTP_API_URL
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET
      - STRIPE_SUCCESS_URL
      - STRIPE_CANCEL_URL
    volumes:
      - goldilocks-attachments:/var/lib/goldilocks-attachments
      - ./secrets/tls/ca.crt:/etc/goldilocks-tls/ca.crt:ro
      - ./secrets/tls/client-backend.crt:/etc/goldilocks-tls/client.crt:ro
      - ./secrets/tls/client-backend.key:/etc/goldilocks-tls/client.key:ro
    # No host port published — the Cloudflare tunnel reaches this over the
    # internal compose network. Nothing is directly exposed.
    expose:
      - "4000"

  agent:
    build: .
    image: goldilocks-backend:latest
    restart: unless-stopped
    logging: *default-logging
    command: ["node", "dist/agent/index.js"]
    depends_on:
      goldilocks-db:
        condition: service_healthy
      backend:
        condition: service_started
    # See backend service above — no env_file, secrets arrive via
    # `sops exec-env` into compose's process env.
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER:-goldilocks}:${POSTGRES_PASSWORD}@goldilocks-db:5432/${POSTGRES_DB:-goldilocks}?sslmode=verify-full&sslrootcert=/etc/goldilocks-tls/ca.crt&sslcert=/etc/goldilocks-tls/client.crt&sslkey=/etc/goldilocks-tls/client.key
      - AGENT_DB_DIR=/var/lib/goldilocks-agent
      # Forwarded from compose process env
      - LOG_LEVEL
      - APP_ENCRYPTION_KEY
      - ENCRYPT_AT_REST_V1
      - AGENT_DB_ENCRYPTION_KEY
      - XMTP_GRPC_URL
      - XMTP_GRPC_SECURE
      - XMTP_NETWORK
      - XMTP_API_URL
      - SIWE_DOMAIN
      - SIWE_URI
    volumes:
      - goldilocks-agent-data:/var/lib/goldilocks-agent
      - ./secrets/tls/ca.crt:/etc/goldilocks-tls/ca.crt:ro

  # Cloudflare "quick tunnel" (TryCloudflare). No account, no token, no
  # domain: cloudflared opens an outbound connection and Cloudflare assigns
  # a random https://<random>.trycloudflare.com hostname that proxies to the
  # backend. Nothing inbound is exposed on the box.
  #
  # The hostname is ephemeral. It stays alive as long as this container keeps
  # running — it survives a backend-only redeploy — but a new one is issued
  # whenever cloudflared restarts (box reboot, crash, or explicit restart).
  # Read the current URL with:  ./scripts/tunnel-url.sh
  #
  # To move to a stable custom domain later, swap this service for the
  # named-tunnel form commented out below. See docs/production-setup.md.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging: *default-logging
    command: ["tunnel", "--no-autoupdate", "--url", "http://backend:4000"]
    depends_on:
      backend:
        condition: service_started

  # --- Named tunnel (stable custom domain). Use this in place of the quick
  # tunnel above once a domain is on Cloudflare and you have a tunnel token
  # in .env.prod as CLOUDFLARE_TUNNEL_TOKEN.
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   logging: *default-logging
  #   command: ["tunnel", "run"]
  #   environment:
  #     TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in .env.prod}
  #   depends_on:
  #     backend:
  #       condition: service_started

  # On-demand backup. Runs as a one-shot container — no long-running
  # service, no scheduling. Trigger it manually from the goldilocks CLI
  # (Backups → Run backup now) or directly:
  #
  #   docker compose -f docker-compose.prod.yml --profile backup run --rm backup
  #
  # Pipeline: pg_dump streamed into restic + agent volume + attachments
  # volume + secrets bundle + git bundles of both repos, all into a
  # single encrypted/deduplicated repo at ./backups/restic-prod/.
  # Restore: ./scripts/restore.sh — see docs/encryption-and-backup-plan.md.
  backup:
    build:
      context: .
      dockerfile: dev/Dockerfile.backup
    image: goldilocks-backup:latest
    profiles: ["backup"]                 # service only starts when invoked
    logging: *default-logging
    depends_on:
      goldilocks-db:
        condition: service_healthy
    environment:
      BACKUP_ENV: prod
      PGHOST: goldilocks-db
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER:-goldilocks}
      PGDATABASE: ${POSTGRES_DB:-goldilocks}
      # F5 — pg_dump also goes over mTLS to the SSL-only postgres above.
      # PGSSLCERT + PGSSLKEY present the backup-specific client leaf so
      # postgres can identify this caller distinctly from the backend
      # and agent in audit logs.
      PGSSLMODE: verify-full
      PGSSLROOTCERT: /backup/secrets/tls/ca.crt
      PGSSLCERT: /backup/secrets/tls/client-backup.crt
      PGSSLKEY: /backup/secrets/tls/client-backup.key
      RESTIC_REPOSITORY: /repo
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      # Repos to bundle. The CLI resolves HOST_GOLDILOCKS_IOS_DIR via
      # the .env.prod setup and mounts them below. The iOS repo is
      # optional on the prod box; backup.sh silently skips it if the
      # mount point isn't a git repo.
      BACKUP_SOURCE_REPOS: /source/goldilocks-backend,/source/goldilocks-ios
    volumes:
      # The restic repo. One per environment so dev and prod don't
      # share snapshot history.
      - ./backups/restic-prod:/repo
      # Volumes captured into each snapshot. Read-only so we can never
      # mutate live data from inside the backup container.
      - goldilocks-agent-data:/agent-data:ro
      - goldilocks-attachments:/attachments:ro
      # Secrets bundle. Mount into a dedicated /backup/... namespace so
      # nothing under it can collide with its own subdirectory names
      # during staging — earlier we had ./secrets:/secrets/secrets which
      # produced /snapshot/secrets/secrets/, and the resulting restore
      # then recreated ./secrets/secrets/ on the host, growing one
      # nesting level per backup/restore cycle.
      # The sealed `secrets/prod.env.enc` lives under this mount, so the
      # encrypted env is backed up as part of the secrets bundle — there
      # is no plaintext .env.prod on the host to mount.
      - ./secrets:/backup/secrets:ro
      # Restic passphrase. The operator chooses where this lives —
      # default is ./.restic-passphrase.prod (chmod 600, gitignored).
      - ./.restic-passphrase.prod:/run/secrets/restic_password:ro
      # Source repos. The backend is the cwd; the monorepo root
      # (containing the iOS app) is the parent directory.
      - .:/source/goldilocks-backend:ro
      - ${HOST_GOLDILOCKS_IOS_DIR:-..}:/source/goldilocks-ios:ro
      # The script itself.
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/backup.sh"]

  # XMTP push-notification relay. Disabled — push notifications are deferred
  # (see the Deferred section of docs/production-setup.md). When ready, put
  # the .p8 auth key in ./secrets/, uncomment this service, and redeploy.
  #
  # notification-server:
  #   image: xmtp/example-notification-server-go:latest
  #   platform: linux/amd64
  #   restart: unless-stopped
  #   logging: *default-logging
  #   depends_on:
  #     goldilocks-db:
  #       condition: service_healthy
  #   environment:
  #     DB_CONNECTION_STRING: postgres://${POSTGRES_USER:-goldilocks}:${POSTGRES_PASSWORD}@goldilocks-db:5432/${POSTGRES_DB:-goldilocks}?sslmode=disable
  #     XMTP_GRPC_ADDRESS: ${XMTP_GRPC_URL}
  #     APNS_TOPIC: ${APNS_TOPIC}
  #     APNS_KEY_PATH: /run/secrets/apns_auth_key.p8
  #     APNS_KEY_ID: ${APNS_KEY_ID}
  #     APNS_TEAM_ID: ${APNS_TEAM_ID}
  #     APNS_MODE: production
  #     LOG_LEVEL: info
  #   volumes:
  #     - ./secrets/apns_auth_key.p8:/run/secrets/apns_auth_key.p8:ro

volumes:
  goldilocks-pgdata:
  goldilocks-agent-data:
  goldilocks-attachments:
