# Goldilocks-specific Docker stack.
#
# Brings up:
#   - goldilocks-db          Postgres for the backend + notification server
#   - notification-server    XMTP push relay (APNs / FCM)
#   - backend                The Fastify app
#
# Bring up the upstream XMTP node first via convos-ios's `./dev/up`, then
# run `docker compose -f goldilocks-backend/docker-compose.yml up -d`.
# The notification server connects to the XMTP node on the host network.

name: goldilocks

services:
  goldilocks-db:
    image: postgres:16
    environment:
      POSTGRES_USER: goldilocks
      POSTGRES_PASSWORD: goldilocks
      POSTGRES_DB: goldilocks
    ports:
      # Host port is parameterised so dev/restore-drill can spin up the
      # parallel restore-test project on a different port without
      # colliding with the live dev stack on 25433. Defaults preserve
      # the normal `npm run cli -- --dev` → Systems → Start flow.
      - "${HOST_PG_PORT:-25433}:5432"
    volumes:
      - goldilocks-pgdata:/var/lib/postgresql/data
      # F5 — dev TLS, same shape as prod so the restore-drill exercises
      # the SSL path. Generated by scripts/init-tls.sh (or Settings →
      # Run setup). The bind-mounted files are copied to a writable
      # location with postgres ownership by db-entrypoint.sh, so the
      # server can read its own key file.
      - ./secrets/tls:/etc/postgresql-tls-src:ro
      - ./scripts/db-entrypoint.sh:/usr/local/bin/db-entrypoint.sh:ro
    entrypoint: /usr/local/bin/db-entrypoint.sh
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/etc/postgresql-tls/server.crt"
      - "-c"
      - "ssl_key_file=/etc/postgresql-tls/server.key"
      - "-c"
      - "ssl_ca_file=/etc/postgresql-tls/ca.crt"
      - "-c"
      - "ssl_min_protocol_version=TLSv1.3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldilocks -d goldilocks"]
      interval: 3s
      timeout: 3s
      retries: 10

  # The XMTP example notification server. It subscribes to topics on the
  # XMTP node and relays envelopes to APNs (iOS) / FCM (Android).
  #
  # Reads its own subscription state from a separate goldilocks_notif_db.
  # We don't share state with our backend; the backend's notification
  # subscribe/unsubscribe endpoints write to the same DB the notification
  # server reads from (configurable). For now we let the notification
  # server own its own DB, and you can wire your backend to the same
  # tables once you've decided on a topic format.
  #
  # Source: https://github.com/xmtp/example-notification-server-go
  # Image: built locally from that repo, or pull a pre-built one.
  # We pin to "latest" for now; pin to a SHA in production.
  notification-server:
    image: xmtp/example-notification-server-go:latest
    platform: linux/amd64
    depends_on:
      goldilocks-db:
        condition: service_healthy
    environment:
      # Postgres
      DB_CONNECTION_STRING: postgres://goldilocks:goldilocks@goldilocks-db:5432/goldilocks?sslmode=disable
      # XMTP node — uses the host network to reach the convos-ios `node` container.
      # On macOS, host.docker.internal points at the host. The XMTP node listens
      # on 5556 (gRPC) on the host.
      XMTP_GRPC_ADDRESS: host.docker.internal:5556
      # APNs — REQUIRES an Apple Developer membership. Until you have one,
      # leave these blank and push delivery will silently no-op.
      # Once you have a .p8 auth key, mount it and set the path here.
      APNS_TOPIC: org.convos.ios-local      # change to your bundle id once you rebrand
      APNS_KEY_PATH: /run/secrets/apns_auth_key.p8
      APNS_KEY_ID: ""
      APNS_TEAM_ID: ""
      APNS_MODE: development                # development | production
      # FCM (optional, for Android later)
      FCM_CREDENTIALS_JSON: ""
      LOG_LEVEL: info
    ports:
      - "8080:8080"     # gRPC API the notification server exposes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Mount your APNs key here once you have it. Until then this is a no-op.
    # volumes:
    #   - ./secrets/apns_auth_key.p8:/run/secrets/apns_auth_key.p8:ro

  backend:
    build: .
    depends_on:
      goldilocks-db:
        condition: service_healthy
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      # F5 — TLS-pinned connection to postgres, matches the prod shape.
      DATABASE_URL: postgres://goldilocks:goldilocks@goldilocks-db:5432/goldilocks?sslmode=verify-full&sslrootcert=/etc/goldilocks-tls/ca.crt
      JWT_SECRET: ${JWT_SECRET:-dev_only_secret_replace_me_with_openssl_rand_hex_32_xx}
      JWT_TTL_SECONDS: 86400
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-mock}
      LIGHTHOUSE_API_KEY: ${LIGHTHOUSE_API_KEY:-}
      IPFS_GATEWAY: ${IPFS_GATEWAY:-https://gateway.lighthouse.storage/ipfs}
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
    ports:
      # Parameterised so the restore drill (parallel project) can
      # publish on a different host port (4001) and probe the *restored*
      # backend without colliding with the live one.
      - "${HOST_BACKEND_PORT:-4000}:4000"
    volumes:
      - ./secrets/tls/ca.crt:/etc/goldilocks-tls/ca.crt:ro

  # Server-side XMTP agents (admins-agent + reports-agent). Maintains the
  # cross-admin Admins group, every client's Advisory group, and owns
  # every client's Reports group. Reacts to LISTEN/NOTIFY on the same DB
  # the API writes to, so /v2/me + /v2/admin/promote-self automatically
  # trigger group provisioning + membership reconciliation.
  #
  # Run locally for dev (faster iteration; @xmtp/node-sdk's native Rust
  # bindings need glibc which the alpine base above doesn't ship):
  #
  #   cd goldilocks-backend
  #   AGENT_DB_DIR=./.agent-data npm run agents:dev
  #
  # The local run reaches Postgres via the published 25433 port and the
  # XMTP node via localhost:5555 (convos-ios `./dev/up`). To dockerize
  # later, switch the runtime base to node:20-bookworm-slim and uncomment
  # this service.
  #
  # agent:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.agent
  #   command: ["npm", "run", "agents:dev"]
  #   depends_on:
  #     goldilocks-db:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgres://goldilocks:goldilocks@goldilocks-db:5432/goldilocks
  #     XMTP_NETWORK: ${XMTP_NETWORK:-local}
  #     XMTP_API_URL: ${XMTP_API_URL:-http://host.docker.internal:5555}
  #     AGENT_DB_DIR: /var/lib/goldilocks-agent
  #     AGENT_DB_ENCRYPTION_KEY: ${AGENT_DB_ENCRYPTION_KEY:-}
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   volumes:
  #     - goldilocks-agent-data:/var/lib/goldilocks-agent

  # On-demand backup, dev mirror of the prod backup service. See
  # docker-compose.prod.yml for the design and
  # docs/encryption-and-backup-plan.md F1/F6.
  #
  # Trigger from the goldilocks CLI (--dev → Backups → Run backup now)
  # or directly:
  #
  #   docker compose --profile backup run --rm backup
  #
  # Dev restic repo at ./backups/restic-dev/, unlocked with the dev
  # passphrase at ./dev/restic-passphrase.dev (gitignored). Exercises
  # the same code path as prod so ./dev/restore-drill catches
  # regressions before they reach prod.
  backup:
    build:
      context: .
      dockerfile: dev/Dockerfile.backup
    image: goldilocks-backup:latest
    profiles: ["backup"]
    depends_on:
      goldilocks-db:
        condition: service_healthy
    environment:
      BACKUP_ENV: dev
      PGHOST: goldilocks-db
      PGPASSWORD: goldilocks
      PGUSER: goldilocks
      PGDATABASE: goldilocks
      # F5 — pg_dump also goes over TLS against the SSL-only postgres.
      PGSSLMODE: verify-full
      PGSSLROOTCERT: /secrets/secrets/tls/ca.crt
      RESTIC_REPOSITORY: /repo
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      BACKUP_SOURCE_REPOS: /source/goldilocks-backend,/source/goldilocks-ios
    volumes:
      - ./backups/restic-dev:/repo
      # Dev runs the agent natively (see npm run agents:dev above), so
      # the agent data lives in ./.agent-data on the host, not in a
      # named volume. Snapshot that.
      - ./.agent-data:/agent-data:ro
      # Local-storage attachments dir (default LOCAL_STORAGE_DIR from
      # src/config.ts). Backup.sh tolerates this being missing if dev
      # is configured with STORAGE_PROVIDER=mock.
      - ./.attachments:/attachments:ro
      # Secrets bundle: dev/ holds dev-only certs / keys, secrets/
      # holds the shared TLS material + age keys. .env.dev is mounted
      # alongside so the snapshot captures it too.
      - ./dev:/secrets/dev:ro
      - ./secrets:/secrets/secrets:ro
      - ./.env.dev:/secrets/.env.dev:ro
      - ./dev/restic-passphrase.dev:/run/secrets/restic_password:ro
      - .:/source/goldilocks-backend:ro
      - ${HOST_GOLDILOCKS_IOS_DIR:-../goldilocks-ios}:/source/goldilocks-ios:ro
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/backup.sh"]

volumes:
  goldilocks-pgdata:
  # goldilocks-agent-data:
