version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Roll patch + minor updates together to cut PR volume.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - patch
          - minor
    ignore:
      # Major-version bumps still come through as individual PRs so they
      # get explicit review.
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
